name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGION: asia-southeast1
  REGISTRY: asia-southeast1-docker.pkg.dev

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:15-3.3-alpine
        env:
          POSTGRES_DB: hdb3d_test
          POSTGRES_USER: hdb3d
          POSTGRES_PASSWORD: testpass
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest pytest-asyncio httpx
      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://hdb3d:testpass@localhost:5432/hdb3d_test
        run: alembic upgrade head
      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://hdb3d:testpass@localhost:5432/hdb3d_test
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
        run: pytest tests/ -v

  lint-frontend:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefix frontend
      - run: npm run lint --prefix frontend

  build-push:
    name: Build & Push Docker Images
    needs: [test-backend, lint-frontend]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
      - name: Build & push API image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/hdb3d/api:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/hdb3d/api:latest \
            ./backend
          docker push --all-tags ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/hdb3d/api
      - name: Build & push frontend image
        run: |
          docker build --target prod \
            --build-arg VITE_MAPBOX_TOKEN=${{ secrets.MAPBOX_TOKEN }} \
            --build-arg VITE_API_URL=${{ secrets.API_URL }} \
            --build-arg VITE_WS_URL=${{ secrets.WS_URL }} \
            -t ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/hdb3d/frontend:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/hdb3d/frontend:latest \
            ./frontend
          docker push --all-tags ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/hdb3d/frontend

  deploy:
    name: Deploy to Cloud Run
    needs: build-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy API to Cloud Run
        run: |
          gcloud run services update hdb3d-api \
            --region=${{ env.REGION }} \
            --image=${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/hdb3d/api:${{ github.sha }}
      - name: Deploy Worker to Cloud Run
        run: |
          gcloud run services update hdb3d-worker \
            --region=${{ env.REGION }} \
            --image=${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/hdb3d/api:${{ github.sha }}
